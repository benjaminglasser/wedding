<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer chip edge with notches -->
  <circle cx="32" cy="32" r="30" fill="#b91c3c"/>
  
  <!-- Notches around the edge -->
  <g fill="#fbbf24">
    <rect x="29" y="1" width="6" height="8" rx="1"/>
    <rect x="29" y="55" width="6" height="8" rx="1"/>
    <rect x="1" y="29" width="8" height="6" rx="1"/>
    <rect x="55" y="29" width="8" height="6" rx="1"/>
  </g>
  <g fill="#ec4899">
    <rect x="10" y="5" width="6" height="8" rx="1" transform="rotate(45 13 9)"/>
    <rect x="48" y="5" width="6" height="8" rx="1" transform="rotate(-45 51 9)"/>
    <rect x="10" y="51" width="6" height="8" rx="1" transform="rotate(-45 13 55)"/>
    <rect x="48" y="51" width="6" height="8" rx="1" transform="rotate(45 51 55)"/>
  </g>
  
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="22" fill="#fff5f5" stroke="#b91c3c" stroke-width="2"/>
  
  <!-- Decorative dots around inner edge -->
  <g fill="#b91c3c">
    <circle cx="32" cy="12" r="1.5"/>
    <circle cx="32" cy="52" r="1.5"/>
    <circle cx="12" cy="32" r="1.5"/>
    <circle cx="52" cy="32" r="1.5"/>
    <circle cx="18" cy="18" r="1.5"/>
    <circle cx="46" cy="18" r="1.5"/>
    <circle cx="18" cy="46" r="1.5"/>
    <circle cx="46" cy="46" r="1.5"/>
  </g>
  
  <!-- Heart -->
  <path d="M32 44 C32 44 20 34 20 26 C20 21 24 18 28 18 C30 18 32 20 32 22 C32 20 34 18 36 18 C40 18 44 21 44 26 C44 34 32 44 32 44Z" fill="#dc2626"/>
  
  <!-- Heart shine -->
  <ellipse cx="26" cy="25" rx="2" ry="3" fill="#fff" opacity="0.4"/>
</svg>
